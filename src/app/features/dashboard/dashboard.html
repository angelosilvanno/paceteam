<div class="dashboard-container">
  
  <aside class="profile-sidebar">
    <div class="profile-card">
      <div class="avatar-wrapper">
        <img src="https://i.pravatar.cc/150?u=me" alt="Sua foto" class="avatar">
        <div class="status-online"></div>
      </div>
      
      <!-- EXIBIÇÃO DO NOME DO USUÁRIO -->
      <h3>{{ user?.nome }}</h3>
      <p class="user-role">Atleta PaceTeam</p>
      
      <div class="pace-display">
        <span class="label">Meu Ritmo</span>
        <span class="value">{{ meuPace }} <span>min/km</span></span>
      </div>

      <button routerLink="/perfil" class="btn-full-profile">Ver Perfil Completo</button>
    </div>
  </aside>

  <main class="dashboard-main">
    <header class="main-header">
      <h2>Corredores Compatíveis 🏃‍♂️</h2>
      <p>Estes atletas correm em um ritmo próximo ao seu.</p>
    </header>

    <div class="runner-grid">
      <div class="runner-card" *ngFor="let runner of sugestoes">
        <img [src]="runner.foto" alt="{{ runner.nome }}">
        <h4>{{ runner.nome }}</h4>
        <div class="pace-tag">{{ runner.pace }} min/km</div>
        <p class="runner-goal">{{ runner.objetivo }}</p>
        <button class="btn-action">Convidar para Treino</button>
      </div>
    </div>
  </main>
</div>
