<div class="profile-page">
  <div class="profile-container" *ngIf="user">
    
    <!-- Cabeçalho do Perfil -->
    <header class="profile-header">
      <div class="banner"></div>
      <div class="header-content">
        <div class="avatar-container">
          <img [src]="user.foto || 'https://i.pravatar.cc/150?u=avatar'" alt="Foto de perfil">
        </div>
        <h1 class="user-name">{{ user.nome }}</h1>
        <p class="user-bio">{{ user.objetivo || 'Corredor apaixonado pelo PaceTeam' }}</p>
      </div>
    </header>

    <!-- Grid de Informações -->
    <div class="info-grid">
      
      <div class="info-card">
        <div class="card-icon">⚡</div>
        <div class="card-text">
          <h3>Pace Médio</h3>
          <p>{{ user.pace }} min/km</p>
        </div>
      </div>

      <div class="info-card">
        <div class="card-icon">📅</div>
        <div class="card-text">
          <h3>Disponibilidade</h3>
          <ul>
            <li *ngFor="let dia of user.dias">{{ dia }}</li>
          </ul>
        </div>
      </div>

      <div class="info-card">
        <div class="card-icon">🗺️</div>
        <div class="card-text">
          <h3>Distâncias</h3>
          <div class="tags">
            <span class="tag" *ngFor="let dist of user.distancias">{{ dist }}</span>
          </div>
        </div>
      </div>

    </div>

    <footer class="profile-actions">
      <button class="btn-edit">Editar Meu Perfil</button>
      <p class="member-since">Membro desde Abril de 2024</p>
    </footer>

  </div>
</div>
