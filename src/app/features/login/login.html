<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Bem-vindo de volta! <span>🏃‍♂️</span></h2>
      <p>Acesse sua conta para encontrar seu time.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input 
          id="email"
          type="email" 
          formControlName="email" 
          placeholder="seu@email.com"
          [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        >
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input 
          id="senha"
          type="password" 
          formControlName="senha" 
          placeholder="Sua senha"
          [class.error]="loginForm.get('senha')?.invalid && loginForm.get('senha')?.touched"
        >
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="btn-login">
        Entrar no PaceTeam
      </button>

      <div class="login-footer">
        <p>Ainda não faz parte? <a routerLink="/cadastro">Criar conta</a></p>
        <a href="#" class="forgot-password">Esqueceu a senha?</a>
      </div>
    </form>
  </div>
</div>
